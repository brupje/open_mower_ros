# Robot footprint polygon (base_link = wheel axis centre)
# OM_ROBOT_FRONT: distance in metres from wheel axis to front of robot  (default 0.473)
# OM_ROBOT_REAR:  distance in metres from wheel axis to rear of robot   (default 0.100)
# OM_ROBOT_HALF_WIDTH: half the robot width in metres                   (default 0.212)
footprint: >
  [[ $(optenv OM_ROBOT_FRONT 0.473),  $(optenv OM_ROBOT_HALF_WIDTH 0.212)],
   [ $(optenv OM_ROBOT_FRONT 0.473), -$(optenv OM_ROBOT_HALF_WIDTH 0.212)],
   [-$(optenv OM_ROBOT_REAR  0.100), -$(optenv OM_ROBOT_HALF_WIDTH 0.212)],
   [-$(optenv OM_ROBOT_REAR  0.100),  $(optenv OM_ROBOT_HALF_WIDTH 0.212)]]

global_frame: map
robot_base_frame: base_link

plugins:
- name: static_layer
  type: costmap_2d::StaticLayer
- name: obstacle_layer
  type: costmap_2d::ObstacleLayer
- name: inflation_layer
  type: costmap_2d::InflationLayer

static_layer:
  map_topic: mower_map_service/map
obstacle_layer:
  max_obstacle_height: 1.0
  obstacle_range: 3.0
  raytrace_range: 4.0
